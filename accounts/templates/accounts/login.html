{% extends 'base.html' %}
{% block title %}Owner Login{% endblock %}

{% block content %}
<div class="container" style="max-width: 400px; padding-top: 4rem;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <div style="font-size: 3rem;">🔐</div>
        <h1>Owner Login</h1>
        <p style="color: var(--muted); font-size: 0.875rem; margin-top: 0.5rem;">Business dashboard access</p>
    </div>

    <div class="card">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-input" placeholder="admin" autofocus required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.75rem;">
                Login →
            </button>
        </form>
    </div>

    <p style="text-align: center; margin-top: 1rem; color: var(--muted); font-size: 0.8rem;">
        <a href="/chatbot/" style="color: var(--accent-light);">← Back to Chatbot</a>
    </p>
</div>
{% endblock %}
